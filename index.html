<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI 활용 현황 조사 — 퍼블리싱사업8실</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Barlow+Condensed:wght@800&display=swap" rel="stylesheet">
<style>
@import url("https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&display=swap");
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F6F8FA;--accent:#8DC63F;--soft:#F0F7E0;--dark:#5A8A20;--mid:#C4D880;
  --t1:#1a1a1a;--t2:#7a8a60;--t3:#AAB08A;--t4:#C8D4B8;
  --bd:#E2E4DC;--inner-bd:#DDE0D0;
  --warn:#C0624A;--warn-soft:#FAEEE9;
  --r:20px;--rs:12px
}
html,body{font-family:"Noto Sans KR",system-ui,sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:0}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes guide-in{
  0%{opacity:0;transform:translateX(-24px)}
  60%{opacity:1;transform:translateX(4px)}
  100%{opacity:1;transform:translateX(0)}
}
@keyframes guide-glow{
  0%{box-shadow:0 0 0 0 rgba(141,198,63,0);border-color:var(--accent)}
  30%{box-shadow:0 0 18px 4px rgba(141,198,63,.35);border-color:#8DC63F}
  70%{box-shadow:0 0 18px 4px rgba(141,198,63,.35);border-color:#8DC63F}
  100%{box-shadow:0 0 0 0 rgba(141,198,63,0);border-color:var(--accent)}
}
@keyframes row-in{
  0%{opacity:0;transform:translateX(-10px)}
  100%{opacity:1;transform:translateX(0)}
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes confetti-fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100px) rotate(420deg);opacity:0}}

/* 레이아웃 */
.shell{width:100%;display:flex;flex-direction:column;gap:20px;align-items:center;padding:32px 20px}
.card{width:960px;background:#F4F5F0;border-radius:var(--r);overflow:hidden;border:1px solid var(--bd);display:grid;grid-template-columns:360px 600px;height:860px}

/* 왼쪽 비주얼 */
.vis{background:#EAEDDF;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:28px;border-right:1px solid var(--inner-bd);position:relative;overflow:hidden}
.vis-org{font-size:11px;color:#B0B8A0;font-weight:400;text-align:center;line-height:1.6;margin-top:4px;letter-spacing:-.2px}
.vis-eight{margin:auto 0;display:flex;flex-direction:column;align-items:center;gap:12px}
.vis-tag{font-size:10px;font-weight:700;color:#5A7A20;letter-spacing:.08em;padding:5px 14px;border-radius:20px;background:#D6E8A0;border:1px solid var(--mid)}
.vis-desc{font-size:13px;font-weight:700;color:var(--t1);text-align:center;line-height:1.6}
.vis-sub{font-size:11px;color:var(--t2);text-align:center;line-height:1.6}

/* 별점 기준표 */
.star-guide{background:#fff;border-radius:var(--rs);border:2px solid var(--accent);padding:14px 16px;margin-top:auto;width:100%;animation:guide-in .45s cubic-bezier(.22,1,.36,1) forwards, guide-glow 1.8s ease 0.4s 1}
.star-guide-title{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.star-guide-row{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.star-guide-row:last-child{margin-bottom:0}
.sg-stars{font-size:11px;flex-shrink:0;width:56px;letter-spacing:1px;color:#F0C040}
.sg-num{font-size:10px;font-weight:700;color:var(--accent);flex-shrink:0;width:22px}
.sg-desc{font-size:11px;color:var(--t2);line-height:1.4}

/* 오른쪽 설문 */
.form{background:#fff;padding:32px 28px;display:flex;flex-direction:column;overflow:hidden;height:100%}
.f-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.f-dots{display:flex;gap:5px;align-items:center}
.f-dot{width:6px;height:6px;border-radius:50%;background:var(--bd);transition:all .3s}
.f-dot.active{background:var(--accent);width:18px;border-radius:3px}
.f-dot.done{background:var(--mid)}
.f-step-num{font-size:11px;color:var(--t3);font-weight:500}
.f-step{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.f-step-dot{width:4px;height:4px;border-radius:50%;background:var(--accent)}
.f-title{font-size:20px;font-weight:700;color:var(--t1);line-height:1.35;margin-bottom:4px;letter-spacing:-.3px}
.f-sub{font-size:12px;color:var(--t3);margin-bottom:18px}
.f-sub-small{font-size:11px;color:var(--t4);margin-bottom:18px;margin-top:-12px}
.req{font-size:11px;background:var(--warn-soft);color:var(--warn);padding:2px 8px;border-radius:9px;margin-left:6px;font-weight:600;vertical-align:middle}

/* 옵션 */
.opts{display:flex;flex-direction:column;gap:7px;flex:1}
.opt{display:flex;align-items:center;gap:10px;padding:11px 13px;border:1.5px solid #E8EAE0;border-radius:var(--rs);cursor:pointer;transition:all .15s;user-select:none;background:#FAFAF7}
.opt:hover:not(.disabled){border-color:var(--mid);background:#F5F8EE}
.opt.sel{border-color:var(--accent);background:var(--soft)}
.opt.disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.opt-ic{width:28px;height:28px;border-radius:7px;background:#F0F0E8;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;color:#888}.opt-ic svg{width:16px;height:16px;stroke:currentColor}.opt.sel .opt-ic{background:var(--accent)}.opt.sel .opt-ic svg{color:#fff}
.opt.sel .opt-ic{background:var(--accent)}
.opt-body{flex:1}
.opt-body strong{font-size:13px;font-weight:500;color:#444;display:block;line-height:1.35}
.opt-body span{font-size:11px;color:#AAA}
.opt.sel .opt-body strong{color:var(--dark)}
.radio{width:15px;height:15px;border-radius:50%;border:1.5px solid #DDD;flex-shrink:0;transition:all .15s}
.opt.sel .radio{background:var(--accent);border-color:var(--accent)}
.cbox{width:15px;height:15px;border-radius:4px;border:1.5px solid #DDD;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.opt.sel .cbox{background:var(--accent);border-color:var(--accent)}
.cbox svg{display:none;width:9px;height:9px}
.opt.sel .cbox svg{display:block}

/* 기타 인라인 입력 */
.other-input{display:none;margin-top:6px}
.other-input.show{display:block}
.other-input input,.other-input textarea{width:100%;padding:9px 12px;border:1.5px solid var(--bd);border-radius:var(--rs);font-size:13px;font-family:inherit;color:var(--t1);background:#fff;outline:none;transition:border-color .15s;resize:none}
.other-input input:focus,.other-input textarea:focus{border-color:var(--accent)}

/* 별점 */
.star-rating{display:flex;gap:6px;margin-top:8px;margin-bottom:2px}
.star-rating .star{font-size:20px;cursor:pointer;color:#DDD;transition:color .1s;user-select:none}
.star-rating .star.on{color:#FFD400}

/* 툴 선택 그리드 */
.tool-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;flex:1}
.tool-item{display:flex;flex-direction:column;gap:0}
.tool-opt{display:flex;align-items:center;gap:8px;padding:9px 11px;border:1.5px solid #E8EAE0;border-radius:var(--rs);cursor:pointer;transition:all .15s;background:#FAFAF7;user-select:none}
.tool-opt:hover{border-color:var(--mid);background:#F5F8EE}
.tool-opt.sel{border-color:var(--accent);background:var(--soft)}
.tool-opt strong{font-size:12px;font-weight:500;color:#444;flex:1}
.tool-opt.sel strong{color:var(--dark)}
.tool-cbox{width:14px;height:14px;border-radius:3px;border:1.5px solid #DDD;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.tool-opt.sel .tool-cbox{background:var(--accent);border-color:var(--accent)}
.tool-cbox svg{display:none;width:8px;height:8px}
.tool-opt.sel .tool-cbox svg{display:block}
.tool-stars{display:none;padding:6px 11px 8px;background:#F0F7E0;border-radius:0 0 var(--rs) var(--rs);border:1.5px solid var(--accent);border-top:none}
.tool-stars.show{display:flex;align-items:center;gap:4px}
.tool-stars .star{font-size:16px;cursor:pointer;color:#DDD;transition:color .1s}
.tool-stars .star.on{color:#FFD400}

/* textarea */
.ta{background:#F5F8EE;border:1.5px solid #E8EAE0;border-radius:var(--rs);padding:13px 15px;transition:border-color .2s;margin-bottom:8px}
.ta:focus-within{border-color:var(--accent)}
.ta textarea{width:100%;border:none;outline:none;font-size:14px;font-family:inherit;color:var(--t1);background:transparent;resize:none;line-height:1.7;min-height:80px}
.ta textarea::placeholder{color:#BCC4AA}

/* 힌트 박스 */
.hint{background:#EEF3E8;border-radius:var(--rs);padding:12px 14px;width:100%}
.hint-label{font-size:10px;font-weight:700;color:var(--dark);letter-spacing:.06em;margin-bottom:8px}
.hint-row{font-size:11px;color:var(--t2);line-height:1.7;display:flex;align-items:flex-start;gap:5px;margin-bottom:3px;word-break:keep-all}
.hint-row span{flex:1;min-width:0}
.hdot{width:3px;height:3px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:7px}

/* 이름 입력 */
.name-ta{background:#F5F8EE;border:1.5px solid #E8EAE0;border-radius:var(--rs);padding:13px 15px;transition:border-color .2s}
.name-ta:focus-within{border-color:var(--accent)}
.name-ta input{width:100%;border:none;outline:none;font-size:15px;font-family:inherit;color:var(--t1);background:transparent}
.name-ta input::placeholder{color:#BCC4AA}

.err{font-size:12px;color:var(--warn);margin-top:6px;display:none}
.err.show{display:block}

/* 하단 네비 */
.f-nav{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:16px;border-top:1px solid #F0F0E8}
.btn-back{font-size:12px;color:#BBB;padding:8px 16px;border:1.5px solid #E8EAE0;border-radius:var(--rs);cursor:pointer;font-family:inherit;background:#fff;transition:all .15s}
.btn-back:hover{border-color:var(--mid)}
.f-step-txt{font-size:11px;color:#CCC}
.btn-next{font-size:13px;font-weight:700;color:#fff;padding:9px 24px;background:var(--accent);border:none;border-radius:var(--rs);cursor:pointer;font-family:inherit;transition:background .15s}
.btn-next:hover{background:var(--dark)}

/* 완료/제출 */
.done{display:none;width:960px;background:#fff;border-radius:var(--r);padding:60px 40px;text-align:center;border:1px solid var(--bd);position:relative;overflow:hidden}
.done.on{display:block}
.done h2{font-size:24px;font-weight:700;color:var(--t1);margin-bottom:10px;letter-spacing:-.3px}
.done p{font-size:14px;color:var(--t2);line-height:1.7}
.submitting{display:none;width:960px;background:#fff;border-radius:var(--r);padding:60px 40px;text-align:center;border:1px solid var(--bd)}
.submitting.on{display:block}
.spinner{width:36px;height:36px;border:3px solid var(--soft);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}

@media(max-width:700px){
  .card{grid-template-columns:1fr;min-height:auto}
  .vis{padding:24px;border-right:none;border-bottom:1px solid var(--inner-bd)}
  .vis-eight{margin:16px 0}
}
</style>
</head>
<body>
<canvas id="bg-wm" style="position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.06;width:100%;height:100%"></canvas>
<div class="shell" style="position:relative;z-index:1">
  <div class="card" id="card">

    <!-- 왼쪽 비주얼 -->
    <div class="vis">
      <div class="vis-org">퍼블리싱라이브본부<br>퍼블리싱사업8실</div>
      <div class="vis-eight" id="vis-eight">
        <div style="animation:float 4s ease-in-out infinite;position:relative;width:200px;height:200px">
          <canvas id="eight-canvas" width="200" height="200"></canvas>
        </div>
        <div class="vis-tag" id="vis-tag">퍼블리싱사업8실</div>
        <div class="vis-desc" id="vis-desc">팀 AI 활용 현황 조사</div>
        <div class="vis-sub" id="vis-sub">솔직하게 답해주세요 :)</div>
      </div>

      <!-- 별점 기준표 (Q4에서만 표시) -->
      <div class="star-guide" id="star-guide" style="display:none">
        <div class="star-guide-title"><svg width="13" height="13" viewBox="0 0 20 20" fill="none"><path d="M10 2l2.4 4.9 5.4.8-3.9 3.8.9 5.3L10 14.3l-4.8 2.5.9-5.3L2.2 7.7l5.4-.8z" fill="#8DC63F" stroke="#8DC63F" stroke-width="1" stroke-linejoin="round"/></svg> 활용도 별점 기준 <span style="font-size:9px;color:var(--accent);background:var(--soft);padding:1px 6px;border-radius:9px;margin-left:2px">Q4 가이드</span></div>
        <div class="star-guide-row" style="animation:row-in .4s ease .5s both"><span class="sg-stars">★☆☆☆☆</span><span class="sg-num">1점</span><span class="sg-desc">거의 못 씀</span></div>
        <div class="star-guide-row" style="animation:row-in .4s ease .62s both"><span class="sg-stars">★★☆☆☆</span><span class="sg-num">2점</span><span class="sg-desc">가끔 써봤지만 익숙하지 않음</span></div>
        <div class="star-guide-row" style="animation:row-in .4s ease .74s both"><span class="sg-stars">★★★☆☆</span><span class="sg-num">3점</span><span class="sg-desc">기본 기능은 활용 가능</span></div>
        <div class="star-guide-row" style="animation:row-in .4s ease .86s both"><span class="sg-stars">★★★★☆</span><span class="sg-num">4점</span><span class="sg-desc">자주 쓰고 꽤 잘 활용함</span></div>
        <div class="star-guide-row" style="animation:row-in .4s ease .98s both"><span class="sg-stars">★★★★★</span><span class="sg-num">5점</span><span class="sg-desc">거의 모든 기능 파악·적극 활용</span></div>
      </div>
    </div>

    <!-- 오른쪽 설문 -->
    <div class="form">
      <div class="f-top">
        <div class="f-dots" id="dots"></div>
        <div class="f-step-num" id="step-num"></div>
      </div>
      <div id="panel-area" style="flex:1;display:flex;flex-direction:column;min-height:0"></div>
      <div class="f-nav">
        <button class="btn-back" id="btn-back">이전</button>
        <span class="f-step-txt" id="step-txt"></span>
        <button class="btn-next" id="btn-next">다음</button>
      </div>
    </div>
  </div>

  <div class="submitting" id="submitting">
    <div class="spinner"></div>
    <p style="font-size:14px;color:var(--t2)">저장하는 중...</p>
  </div>

  <div class="done" id="done">
    <div id="done-confetti" style="position:absolute;inset:0;pointer-events:none;overflow:hidden"></div>
    <div style="position:relative;width:160px;height:160px;margin:0 auto 24px">
      <svg width="160" height="160" viewBox="0 0 150 150">
        <text x="75" y="105" text-anchor="middle" font-family="'Barlow Condensed',system-ui" font-size="130" font-weight="800" font-style="normal"
          fill="none" stroke="#D6E8A0" stroke-width="8" dominant-baseline="middle">8</text>
        <text id="done-8-stroke" x="75" y="105" text-anchor="middle" font-family="'Barlow Condensed',system-ui" font-size="130" font-weight="800" font-style="normal"
          fill="none" stroke="#8DC63F" stroke-width="5" stroke-linecap="round"
          stroke-dasharray="700" stroke-dashoffset="700" dominant-baseline="middle">8</text>
      </svg>
      <div id="done-check" style="position:absolute;bottom:0;right:0;width:44px;height:44px;background:#8DC63F;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(0)">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <polyline id="done-check-poly" points="5,12 10,17 19,7" stroke="white" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"
            stroke-dasharray="60" stroke-dashoffset="60"/>
        </svg>
      </div>
    </div>
    <h2 id="done-title" style="opacity:0;transform:translateY(10px);transition:opacity .5s,transform .5s">응답 완료!</h2>
    <p id="done-sub" style="margin-top:8px;opacity:0;transform:translateY(10px);transition:opacity .5s .15s,transform .5s .15s">바쁜 시간 내어 응답해 주셔서 감사합니다.</p>
    <p id="done-fun" style="margin-top:14px;font-size:13px;color:#5A8A20;font-weight:500;background:#F0F7E0;padding:10px 20px;border-radius:12px;opacity:0;transform:translateY(10px);transition:opacity .5s .3s,transform .5s .3s;line-height:1.7">응답해 주신 내용은 퍼블리싱사업8실 실원 여러분의<br>AI 스킬업을 위해 활용될 예정입니다 <svg style="display:inline-block;vertical-align:middle;margin-left:4px" width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M10 17S3 12.5 3 7.5A4 4 0 0 1 10 5a4 4 0 0 1 7 2.5C17 12.5 10 17 10 17z" fill="#C0624A" opacity=".85"/></svg></p>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyARdUHDyoYKktWqtY5aHddad1Y2VYIaNLn16jv5UFcrT-aDmTvtwPD9c71AtU0FXpe/exec';
const ans = {};

const TOOLS = ['ChatGPT','Claude','Gemini','Copilot','Grok','Perplexity','NotebookLM','Midjourney','DALL·E','Adobe Firefly','Canva AI','Sora','Runway','HeyGen','ElevenLabs','Cursor','GitHub Copilot','Notion AI','뤼튼(Wrtn)'];

// 패널 정의
const PANELS = [
  {id:'name', step:'시작하기 전에', title:'성함을\n입력해 주세요', sub:'응답 데이터에 함께 저장돼요', type:'name',
   vis:{desc:'팀 AI 활용 현황 조사', sub:'시작하기 전에 성함을 알려주세요 :)'}},

  {id:'q1', step:'Q1', title:'AI를 활용하고 싶은 업무나\n아이디어가 있나요?', sub:'구체적으로 적어주세요', type:'textarea',
   placeholder:'예: 매주 반복되는 주간보고 초안을 AI가 잡아준다면 좋겠어요',
   hint:['매주 반복되는 주간보고 초안을 AI가 잡아준다면, 내용 검토에만 집중할 수 있을 것 같아요','경쟁사 동향을 자동으로 모아서 요약해주는 봇이 있으면 리서치 시간을 줄일 수 있을 것 같아요','글로벌 팀과 소통할 때 번역에 시간이 많이 들어요. 맥락에 맞는 번역 툴이 있으면 좋겠어요','발표 자료 초안을 AI가 잡아주면 디자인보다 내용 구성에 집중할 수 있을 것 같아요'],
   vis:{desc:'AI 활용 아이디어', sub:'어떤 업무에 활용하고 싶으신가요?'}},

  {id:'q2', step:'Q2', title:'회사 차원에서 지원해준다면\n도입을 희망하는 툴이 있나요?', sub:'이유와 함께 적어주세요', type:'textarea',

let flowIdx = 0;

function getFlow(){
  return PANELS.filter(p => {
    if(!p.condKey) return true;
    const v = ans[p.condKey];
    if(p.condVal) return v === p.condVal;
    if(p.condIncludes) return Array.isArray(v) && v.includes(p.condIncludes);
    return true;
  });
}

function currentPanel(){ return getFlow()[flowIdx]; }

function updateDots(){
  const flow = getFlow();
  document.getElementById('dots').innerHTML = flow.map((_,i) =>
    `<div class="f-dot ${i<flowIdx?'done':i===flowIdx?'active':''}"></div>`
  ).join('');
  document.getElementById('step-num').textContent = (flowIdx+1)+' / '+flow.length;
  document.getElementById('step-txt').textContent = (flowIdx+1)+' / '+flow.length;
}

function updateVis(p){
  const v = p.vis || {};
  document.getElementById('vis-desc').textContent = v.desc||'';
  document.getElementById('vis-sub').textContent = v.sub||'';
  // Q4에서만 별점 기준표 표시
  const sg = document.getElementById('star-guide');
  sg.style.display = p.id==='q4' ? 'block' : 'none';
  if(p.id==='q4'){
    sg.style.animation = 'none';
    sg.offsetHeight; // reflow
    sg.style.animation = 'guide-in .5s ease forwards, guide-pulse 2s ease-in-out 0.5s 3';
  }
}

function renderOpt(opt, type, key){
  const isSel = type==='single'||type==='single_auto'
    ? ans[key]===opt.v
    : Array.isArray(ans[key]) && ans[key].includes(opt.v);
  const box = type==='single'||type==='single_auto'
    ? `<div class="radio ${isSel?'sel':''}"></div>`
    : `<div class="cbox"><svg viewBox="0 0 10 10"><polyline points="1.5,5 3.8,7.5 8.5,2.5" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;
  return `<div class="opt ${isSel?'sel':''}" data-value="${opt.v.replace(/"/g,'&quot;')}">
    <div class="opt-ic">${opt.ic||''}</div>
    <div class="opt-body"><strong>${opt.v}</strong>${opt.sub?`<span>${opt.sub}</span>`:''}</div>
    ${box}

}

function validate(){
  const p=currentPanel();
  if(!p) return true;
  if(p.type==='name'){
    if(!ans.name){ document.getElementById('err-name').classList.add('show'); return false; }
    return true;
  }
  if(p.type==='textarea') return true;
  if(p.type==='tools') return true;
  if(p.type==='single'||p.type==='single_auto'){
    if(!ans[p.id]){ document.getElementById('err-opt')?.classList.add('show'); return false; }
    return true;
  }
  if(p.type==='multi'||p.type==='multi_exclusive'){
    // multi는 선택 안 해도 넘어갈 수 있게
    return true;
  }
  return true;
}

  if(!validate()) return;
  const flow=getFlow();
  if(flowIdx>=flow.length-1){ submitForm(); return; }
  flowIdx++;

async function submitForm(){
  document.getElementById('card').style.display='none';
  document.getElementById('submitting').classList.add('on');

  // 데이터 정리
  const toolsText = Object.entries(ans.q4_tools||{})
    .map(([k,v])=>`${k}(${v}점)`).join(', ');
  if(ans.q4_other) toolsText ? toolsText+`, 기타:${ans.q4_other}` : `기타:${ans.q4_other}`;

  const properties = {
    '이름': {title:[{text:{content:'응답_'+new Date().toLocaleString('ko-KR')}}]},
    '성함': {rich_text:[{text:{content:ans.name||''}}]},
    'Q1_진입장벽': toMulti(ans.q1),
    'Q2_툴장벽': toMulti(ans.q2),
    'Q3_활용여부': toSelect(ans.q3),
    'Q3_1_활용영역': toMulti(ans.q3_1),
    'Q3_2_빈도': toSelect(ans.q3_2),
    'Q4_업무툴및별점': toText(toolsText),
    'Q5_계속쓰는이유': toSelect(ans.q5),
    'Q6_불만': toText(ans.q6),
    'Q7_도입희망툴': toText(ans.q7),
    'Q8_활용아이디어': toText(ans.q8),
    '제출시각': {date:{start:new Date().toISOString()}}
  };
  Object.keys(properties).forEach(k=>{ if(!properties[k]) delete properties[k]; });

  try {
    await fetch(GAS_URL,{
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({properties})
    });
  } catch(e){ console.error(e); }

  document.getElementById('submitting').classList.remove('on');
  document.getElementById('done').classList.add('on');
  // 8 그리기 애니메이션
  setTimeout(function(){
    var s = document.getElementById('done-8-stroke');
    if(s){ s.style.transition='stroke-dashoffset 1.8s cubic-bezier(.4,0,.2,1)'; s.style.strokeDashoffset='0'; }
  }, 100);
  // 체크 뱃지
  setTimeout(function(){
    var c = document.getElementById('done-check');
    if(c){ c.style.transition='opacity .1s,transform .4s cubic-bezier(.22,1,.36,1)'; c.style.opacity='1'; c.style.transform='scale(1)'; }
    setTimeout(function(){
      var p = document.getElementById('done-check-poly');
      if(p){ p.style.transition='stroke-dashoffset .35s ease'; p.style.strokeDashoffset='0'; }
    }, 100);
  }, 2200);
  // 텍스트
  setTimeout(function(){
    ['done-title','done-sub','done-fun'].forEach(function(id){
      var el=document.getElementById(id);
      if(el){ el.style.opacity='1'; el.style.transform='translateY(0)'; }
    });
  }, 2400);
  // 컨페티
  setTimeout(function(){
    var container=document.getElementById('done-confetti');
    if(!container) return;
    var colors=['#8DC63F','#C4D880','#FFD400','#D6E8A0','#5A8A20'];
    for(var i=0;i<28;i++){
      var el=document.createElement('div');
      el.style.cssText='position:absolute;border-radius:2px;left:'+(5+Math.random()*90)+'%;top:'+(5+Math.random()*25)+'%;width:'+(6+Math.random()*7)+'px;height:'+(6+Math.random()*7)+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';animation:confetti-fall '+(0.9+Math.random()*0.8)+'s ease '+(Math.random()*0.5)+'s both';
      container.appendChild(el);
    }
  }, 2500);
}
